# 60 Words About the Author
author-about: My name is Daniele Berardinelli, also known as 0xBera, I am a 17 y.o student with a strong passion for cybersecurity. I decided to create this blog to make public all the activities I do, to find a future job in the field. Every day I learn new things through CTFs (Capture The Flag), but my study does not end there. I am an enthusiast of the malware world and I enjoy analyzing them.
